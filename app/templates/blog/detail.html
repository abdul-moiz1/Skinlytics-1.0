{% extends 'base.html' %}

{% block content %}
<div class="blog-detail">
    <a href="{{ url_for('blog.index') }}" class="blog-back-link">&larr; Back to Blog</a>

    <div class="blog-detail-header">
        <h1>{{ post.title }}</h1>
        <div class="blog-detail-meta">
            <span>By {{ post.author.username }}</span>
            <span>&middot;</span>
            <span>{{ post.created_at.strftime('%B %d, %Y') }}</span>
        </div>
    </div>

    {% if post.featured_image %}
    <div class="blog-detail-image">
        <img src="{{ url_for('static', filename=post.featured_image) }}" alt="{{ post.title }}">
    </div>
    {% endif %}

    <div class="blog-content">
        {{ post.content | safe }}
    </div>

    <div class="blog-detail-footer">
        <a href="{{ url_for('blog.index') }}" class="blog-back-link">&larr; Back to all articles</a>
    </div>
</div>
{% endblock %}
