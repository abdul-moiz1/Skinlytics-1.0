{% extends 'base.html' %}

{% block content %}
<div class="quiz-container">
    <h1>Skin Health Quiz</h1>
    <p>Answer these questions to discover your skin type and get personalized recommendations</p>

    <div class="quiz-progress">
        <div class="quiz-progress-fill" id="progressFill" style="width: {{ (1 / questions|length * 100) if questions|length > 0 else 0 }}%"></div>
    </div>

    <form method="POST" action="{{ url_for('quiz.submit') }}" id="quizForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        {% for question in questions %}
        <div class="quiz-question" data-question="{{ loop.index }}" {% if not loop.first %}style="display:none"{% endif %}>
            <div class="question-counter">Question {{ loop.index }} of {{ questions|length }}</div>
            <h3>{{ question.question_text }}</h3>
            <div class="quiz-options">
                <label class="quiz-option">
                    <input type="radio" name="q_{{ question.id }}" value="a" required>
                    <span>{{ question.option_a }}</span>
                </label>
                <label class="quiz-option">
                    <input type="radio" name="q_{{ question.id }}" value="b">
                    <span>{{ question.option_b }}</span>
                </label>
                <label class="quiz-option">
                    <input type="radio" name="q_{{ question.id }}" value="c">
                    <span>{{ question.option_c }}</span>
                </label>
            </div>
        </div>
        {% endfor %}

        <div class="quiz-nav">
            <button type="button" class="btn btn-secondary" id="quiz-prev" style="display:none" onclick="navigateQuiz(-1)">Previous</button>
            <button type="button" class="btn btn-primary" id="quiz-next" onclick="navigateQuiz(1)">Next</button>
            <button type="submit" class="btn btn-primary" id="quiz-submit" style="display:none">Submit</button>
        </div>
    </form>
</div>

<script>
    let currentQuestion = 1;
    const totalQuestions = {{ questions|length }};

    function navigateQuiz(direction) {
        const current = document.querySelector(`.quiz-question[data-question="${currentQuestion}"]`);
        const nextIndex = currentQuestion + direction;

        if (nextIndex < 1 || nextIndex > totalQuestions) return;

        if (direction === 1) {
            const selectedOption = current.querySelector('input[type="radio"]:checked');
            if (!selectedOption) {
                alert('Please select an answer before continuing.');
                return;
            }
        }

        current.style.display = 'none';
        currentQuestion = nextIndex;
        const next = document.querySelector(`.quiz-question[data-question="${currentQuestion}"]`);
        next.style.display = 'block';

        updateNavigation();
        updateProgress();
    }

    function updateNavigation() {
        const prevBtn = document.getElementById('quiz-prev');
        const nextBtn = document.getElementById('quiz-next');
        const submitBtn = document.getElementById('quiz-submit');

        prevBtn.style.display = currentQuestion === 1 ? 'none' : 'inline-block';

        if (currentQuestion === totalQuestions) {
            nextBtn.style.display = 'none';
            submitBtn.style.display = 'inline-block';
        } else {
            nextBtn.style.display = 'inline-block';
            submitBtn.style.display = 'none';
        }
    }

    function updateProgress() {
        const progressFill = document.getElementById('progressFill');
        const percentage = (currentQuestion / totalQuestions) * 100;
        progressFill.style.width = percentage + '%';
    }

    document.querySelectorAll('.quiz-option').forEach(option => {
        option.addEventListener('click', function() {
            const parent = this.closest('.quiz-options');
            parent.querySelectorAll('.quiz-option').forEach(opt => opt.classList.remove('active'));
            this.classList.add('active');
        });
    });
</script>
{% endblock %}
